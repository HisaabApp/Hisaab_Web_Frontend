  <circle class="p4" cx="400" cy="225" r="8"/>
  <rect class="p4" x="396" y="225" width="8" height="20"/>
  <!-- Person with laptop -->
  <ellipse class="p3" cx="600" cy="550" rx="150" ry="30"/>
  <rect class="p2" x="520" y="400" width="160" height="100" rx="10"/>
  <rect class="p1" x="530" y="410" width="140" height="80" rx="5"/>
  <rect class="p3" x="560" y="500" width="80" height="10"/>
  <circle class="p5" cx="600" cy="320" r="40"/>
  <path class="p6" d="M560,320 Q600,280 640,320"/>
  <path class="p2" d="M550,380 L650,380 L660,480 L540,480 Z"/>
  <!-- Data blocks -->
  <rect class="p3" x="100" y="150" width="120" height="80" rx="10"/>
  <rect class="p1" x="115" y="170" width="90" height="10" rx="5"/>
  <rect class="p3" x="115" y="190" width="70" height="8" rx="4"/>
  <rect class="p3" x="115" y="205" width="80" height="8" rx="4"/>
  <rect class="p3" x="100" y="260" width="120" height="80" rx="10"/>
  <rect class="p1" x="115" y="280" width="90" height="10" rx="5"/>
  <rect class="p3" x="115" y="300" width="60" height="8" rx="4"/>
  <rect class="p3" x="115" y="315" width="75" height="8" rx="4"/>
  <!-- Connection lines -->
  <line x1="220" y1="190" x2="300" y2="200" stroke="#e6e6e6" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="220" y1="300" x2="300" y2="250" stroke="#e6e6e6" stroke-width="2" stroke-dasharray="5,5"/>
  <!-- Check marks -->
  <circle class="p1" cx="180" cy="380" r="25"/>
  <polyline points="168,380 175,390 195,370" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
