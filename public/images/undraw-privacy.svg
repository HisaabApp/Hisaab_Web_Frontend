<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>.p1{fill:#3b82f6;}.p2{fill:#3f3d56;}.p3{fill:#e6e6e6;}.p4{fill:#f2f2f2;}.p5{fill:#ffb8b8;}.p6{fill:#2f2e41;}</style>
  </defs>
  <!-- Shield -->
  <path class="p1" d="M400,50 L500,100 L500,250 C500,350 400,450 400,450 C400,450 300,350 300,250 L300,100 Z" opacity="0.9"/>
  <path class="p4" d="M400,80 L470,120 L470,240 C470,320 400,400 400,400 C400,400 330,320 330,240 L330,120 Z"/>
